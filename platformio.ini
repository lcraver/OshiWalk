; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[base]
platform = espressif32
board = lilygo-t-hmi
framework = arduino
upload_speed = 921600
monitor_speed = 115200

board_build.filesystem = littlefs

lib_deps =
    bodmer/TFT_eSPI
    bblanchon/ArduinoJson
    https://github.com/liangyingy/arduino_xpt2046_library
    bitbank2/AnimatedGIF
    bitbank2/PNGdec
    mathertel/OneButton

; TFT_eSPI config via build flags (overrides library's User_Setup.h)
build_flags =
    -DUSER_SETUP_LOADED
    ; Display driver & interface
    -DST7789_DRIVER
    -DTFT_PARALLEL_8_BIT
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_OFF
    ; Control pins
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=-1
    -DTFT_WR=8
    -DTFT_RD=-1
    -DTFT_BL=38
    ; Data pins (8-bit parallel)
    -DTFT_D0=48
    -DTFT_D1=47
    -DTFT_D2=39
    -DTFT_D3=40
    -DTFT_D4=41
    -DTFT_D5=42
    -DTFT_D6=45
    -DTFT_D7=46
    ; Fonts
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    ; Board
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1

[env:lilygo-t-hmi]
extends = base
extra_scripts =
    pre:increment_version.py
    flash_all_target.py

[env:device1]
extends = base
extra_scripts = pre:increment_version.py
upload_port = COM16

[env:device2]
extends = base
extra_scripts = pre:increment_version.py
upload_port = COM17
